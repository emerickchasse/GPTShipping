services:
  - type: web
    name: pawswipe-checkout
    runtime: docker
    repo: https://github.com/emerickchasse/GPTShipping
    branch: main
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/checkout-readiness
    autoDeployTrigger: commit
    envVars:
      - key: LIVE_CHECKOUT_ENABLED
        value: "false"
      - key: STRIPE_CHECKOUT_MODE
        value: live
      - key: PUBLIC_BASE_URL
        value: https://pawswipe-checkout.onrender.com
      - key: PUBLIC_STOREFRONT_ORIGIN
        value: https://emerickchasse.github.io
      - key: STRIPE_AUTOMATIC_TAX_ENABLED
        value: "false"
      - key: PRINTFUL_STORE_ID
        value: "18458606"
      - key: PRINTFUL_VARIANT_S
        value: 6a53ef4031cc29
      - key: PRINTFUL_VARIANT_M
        value: 6a53ef4031cc68
      - key: PRINTFUL_VARIANT_L
        value: 6a53ef4031cc81
      - key: PRINTFUL_AUTO_CONFIRM
        value: "false"
      - key: PAWSWIPE_SAMPLE_APPROVED
        value: "false"
      - key: PAWSWIPE_SUPPLIER_BILLING_APPROVED
        value: "false"
      - key: PAWSWIPE_CUSTOMER_POLICIES_APPROVED
        value: "false"
      - key: PAWSWIPE_PRIVATE_SUPPORT_APPROVED
        value: "false"
