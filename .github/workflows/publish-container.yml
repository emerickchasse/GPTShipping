name: Publish checkout container

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/publish-container.yml
      - .dockerignore
      - Dockerfile
      - 4a385d1729a145679725f7df42a21d91.txt
      - BingSiteAuth.xml
      - app.js
      - assets/**
      - bandana-size-guide.html
      - care-guide.html
      - cat-bandana-guide.html
      - commerce-policy.mjs
      - customer-policies.html
      - dog-bandana-material-guide.html
      - feed.xml
      - llms.txt
      - transparency.html
      - guide.js
      - how-to-tie-dog-bandana.html
      - index.html
      - measure-pet-for-bandana.html
      - package.json
      - pivot.css
      - robots.txt
      - render.yaml
      - server.mjs
      - sitemap.xml
      - sitemap.txt
      - styles.css
      - thank-you.html
      - tie-on-vs-over-collar-dog-bandana.html
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: container-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/gptshipping
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Log in to GitHub Container Registry
        run: echo "$GITHUB_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and publish immutable image
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --pull \
            --push \
            --tag "$IMAGE_NAME:${{ github.sha }}" \
            --tag "$IMAGE_NAME:latest" \
            .
