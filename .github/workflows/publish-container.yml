name: Publish checkout container

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/publish-container.yml
      - .dockerignore
      - Dockerfile
      - app.js
      - assets/**
      - care-guide.html
      - index.html
      - package.json
      - robots.txt
      - server.mjs
      - sitemap.xml
      - styles.css
      - thank-you.html
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: container-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/gptshipping
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Log in to GitHub Container Registry
        run: echo "$GITHUB_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and publish immutable image
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --pull \
            --push \
            --tag "$IMAGE_NAME:${{ github.sha }}" \
            --tag "$IMAGE_NAME:latest" \
            .
