name: Deploy pre-launch preview

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - name: Assemble static preview
        run: |
          mkdir -p _site
          cp index.html care-guide.html bandana-size-guide.html measure-pet-for-bandana.html how-to-tie-dog-bandana.html tie-on-vs-over-collar-dog-bandana.html transparency.html thank-you.html favicon.svg app.js guide.js styles.css pivot.css robots.txt sitemap.xml sitemap.txt 4a385d1729a145679725f7df42a21d91.txt _site/
          cp -R assets _site/assets
          touch _site/.nojekyll
      - name: Upload preview artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
