name: Deploy checkout service

on:
  workflow_run:
    workflows: ["Validate storefront"]
    types: [completed]

permissions:
  contents: read

jobs:
  deploy:
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger protected Render deploy
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          test -n "$RENDER_DEPLOY_HOOK_URL"
          curl --fail-with-body --silent --show-error --retry 3 --request POST "$RENDER_DEPLOY_HOOK_URL"
